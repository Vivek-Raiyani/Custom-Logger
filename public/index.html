    <script>
    // 1. Initialize Pendo with anonymous visitor on page load.
    //    Empty visitor.id lets the SDK resolve from cookies/localStorage
    //    if available, otherwise falls back to a new anonymous visitor.
    pendo.initialize({
        visitor: { id: '' }
    });

    // 2. Call after successful login or register to identify the signed-in user.
    //    Pass the user object returned by the /auth/me or /auth/register API.
    function pendoIdentify(user) {
        pendo.identify({
            visitor: {
                id:        user.id,
                email:     user.email,
                isActive:  user.is_active,
                createdAt: user.created_at,
                updatedAt: user.updated_at
            }
        });
    }

    // 3. Call on sign-out to reset to a fresh anonymous visitor.
    function pendoLogout() {
        pendo.clearSession();
    }
    </script>
